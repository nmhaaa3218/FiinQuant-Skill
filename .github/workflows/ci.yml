name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas signalrcore python-dotenv
        # Install fiinquantx library from custom index
        pip install --extra-index-url https://fiinquant.github.io/fiinquantx/simple fiinquantx

    - name: Run Documentation CLI Search Tests
      run: |
        python3 skills/fiinquant/scripts/fiinquant_search.py

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Validate Node.js Installer Syntax
      run: |
        node --check bin/cli.js

    - name: Run Live Integration Test
      env:
        FIIN_USERNAME: ${{ secrets.FIIN_USERNAME }}
        FIIN_PASSWORD: ${{ secrets.FIIN_PASSWORD }}
      run: |
        python3 -c "
        import os
        from FiinQuantX import FiinSession
        username = os.environ.get('FIIN_USERNAME')
        password = os.environ.get('FIIN_PASSWORD')
        client = FiinSession(username=username, password=password).login()
        print('CI connection check succeeded!')
        "

